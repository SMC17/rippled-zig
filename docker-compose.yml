services:
  rippled-zig:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rippled-zig
    ports:
      - "5005:5005"     # JSON-RPC
      - "51235:51235"   # Peer protocol
      - "6006:6006"     # WebSocket
    volumes:
      - ledger-data:/var/lib/rippled
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

volumes:
  ledger-data:
    driver: local
