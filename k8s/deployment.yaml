apiVersion: apps/v1
kind: Deployment
metadata:
  name: rippled-zig
  labels:
    app.kubernetes.io/name: rippled-zig
    app.kubernetes.io/component: node
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rippled-zig
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rippled-zig
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: rippled-zig
          image: rippled-zig:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: rpc
              containerPort: 5005
              protocol: TCP
            - name: peer
              containerPort: 51235
              protocol: TCP
            - name: websocket
              containerPort: 6006
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rippled-zig-config
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: "1"
          readinessProbe:
            httpGet:
              path: /health
              port: rpc
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: rpc
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /var/lib/rippled
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: rippled-zig-data
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
